<div class="login-container">

  <div class="login-left">
    <div class="brand">
      <span class="brand-slash">/</span>
      <span class="brand-text">vermeg</span>
    </div>

    <div class="left-content">
      <div class="eyebrow">
        <div class="eyebrow-line"></div>
        <span class="eyebrow-text">Internal Platform</span>
      </div>

      <h1>Server Supervision <span>&amp; Deployment</span></h1>

      <p>Monitor, deploy and manage remote application servers with precision, control and full audit traceability.</p>

      <!-- <div class="feature-list">
        <div class="feature-item">
          <span class="feature-num">01</span>
          Real-time server health monitoring
        </div>
        <div class="feature-item">
          <span class="feature-num">02</span>
          Automated WAR/EAR deployment
        </div>
        <div class="feature-item">
          <span class="feature-num">03</span>

        </div>
        <div class="feature-item">
          <span class="feature-num">04</span>
          Centralized log collection &amp; search
        </div>
      </div> -->
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="card-header">
        <h2>Welcome back</h2>
        <p>Sign in to access your workspace</p>
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username"
            required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required />
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button class="submit-btn" type="submit" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Sign In' }} ›
        </button>
      </form>

      <div class="card-footer">
        © 2026 Vermeg Group · All rights reserved
      </div>
    </div>
  </div>

</div>
